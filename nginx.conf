# ══════════════════════════════════════════════════════════════
# NEXUS TRADER — Configuration Nginx
# Reverse proxy HTTPS + Rate limiting + Sécurité
#
# INSTALLATION:
#   1. sudo apt install nginx certbot python3-certbot-nginx
#   2. sudo cp nginx.conf /etc/nginx/sites-available/nexus-trader
#   3. sudo ln -s /etc/nginx/sites-available/nexus-trader /etc/nginx/sites-enabled/
#   4. Remplace "ton-domaine.com" par ton vrai domaine
#   5. sudo certbot --nginx -d ton-domaine.com  (certificat HTTPS gratuit)
#   6. sudo nginx -t && sudo systemctl restart nginx
# ══════════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;      # 30 req/min pour l'API
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;     # 5 req/min pour le login
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;  # 60 req/min général

# Upstream (le bot Docker)
upstream nexus_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ton-domaine.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name ton-domaine.com;

    # ── Certificats SSL (gérés par Certbot) ──
    ssl_certificate /etc/letsencrypt/live/ton-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ton-domaine.com/privkey.pem;

    # ── Config SSL stricte ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Headers de sécurité ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com" always;

    # ── Limites ──
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ── Bloquer les bots/scanners ──
    if ($http_user_agent ~* (bot|crawl|spider|scan|nikto|sqlmap)) {
        return 403;
    }

    # ── Login endpoint (rate limit strict) ──
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://nexus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API endpoints ──
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://nexus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── WebSocket ──
    location /ws {
        proxy_pass http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout long pour les WebSockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check (public) ──
    location = / {
        limit_req zone=general burst=5;
        proxy_pass http://nexus_backend;
    }

    # ── Swagger docs (optionnel, à désactiver en prod) ──
    location /docs {
        # Décommente pour désactiver en production:
        # return 404;

        proxy_pass http://nexus_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://nexus_backend;
    }

    # ── Bloquer tout le reste ──
    location / {
        return 404;
    }

    # ── Logs ──
    access_log /var/log/nginx/nexus-access.log;
    error_log /var/log/nginx/nexus-error.log warn;
}
